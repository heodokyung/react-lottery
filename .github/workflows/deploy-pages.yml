name: Deploy React Lottery to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    # 로또 추첨은 매주 토요일 밤에 진행되므로, 일요일 새벽에 데이터를 갱신합니다.
    - cron: '30 18 * * 6'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 이 프로젝트는 React 17 + react-scripts 4 기반의 오래된 CRA 프로젝트입니다.
      # 최신 npm으로 npm install을 하면 일부 PostCSS 계열 의존성이 최신 버전으로 풀리면서
      # ERR_PACKAGE_PATH_NOT_EXPORTED 오류가 발생할 수 있습니다.
      # package-lock.json(v1) 기준으로 설치되도록 Node 16 + npm 6 조합을 사용합니다.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Install dependencies
        run: npx npm@6 ci

      - name: Update lotto data
        run: npm run update:lotto

      - name: Build
        env:
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run build

      - name: Add nojekyll
        run: touch build/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
