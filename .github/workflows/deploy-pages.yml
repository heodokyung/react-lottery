name: Deploy React Lottery to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    # 로또 추첨은 매주 토요일 밤에 진행되므로, 일요일 새벽에 데이터를 갱신합니다.
    - cron: '30 18 * * 6'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 이 저장소는 예전 CRA + yarn.lock 기반 프로젝트입니다.
      # package-lock.json이 package.json과 맞지 않아 npm ci가 실패하므로,
      # 현재 남아 있는 yarn.lock을 기준으로 설치합니다.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Setup Yarn
        run: npm install -g yarn@1.22.22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Update lotto data
        run: yarn update:lotto

      - name: Build
        env:
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider
        run: yarn build

      - name: Add nojekyll
        run: touch build/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
